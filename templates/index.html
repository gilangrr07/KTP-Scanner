<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KTP Scanner Indonesia</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container py-4">

    <!-- HEADER -->

    <div class="text-center mb-4">

        <h1 class="fw-bold text-primary">
            <i class="bi bi-credit-card-2-front-fill"></i>
            KTP Scanner Indonesia
        </h1>

        <p class="text-muted">
            Computer Vision • OpenCV • EasyOCR • Flask
        </p>

    </div>

    <!-- UPLOAD -->

    <div class="card shadow mb-4">

        <div class="card-body">

            <div class="row">

                <div class="col-md-8">

                    <input
                        type="file"
                        class="form-control"
                        id="imageInput"
                        accept="image/*">

                </div>

                <div class="col-md-4 d-grid">

                    <button
                        class="btn btn-primary"
                        id="scanBtn">

                        <i class="bi bi-camera"></i>

                        Scan KTP

                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- PROGRESS -->

    <div class="card shadow mb-4">

        <div class="card-body">

            <h5>

                <i class="bi bi-cpu"></i>

                Processing

            </h5>

            <div class="progress mt-3">

                <div
                    id="progressBar"
                    class="progress-bar progress-bar-striped progress-bar-animated"
                    style="width:0%">

                    0%

                </div>

            </div>

            <div id="statusBox" class="mt-3">

                Menunggu gambar...

            </div>

        </div>

    </div>

    <!-- IMAGE PIPELINE -->

    <div class="row">

        <div class="col-md-4">

            <div class="card shadow mb-4">

                <div class="card-header">

                    Original

                </div>

                <div class="card-body text-center">

                    <img
                        id="originalImage"
                        class="img-fluid preview">

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow mb-4">

                <div class="card-header">

                    Gaussian Blur

                </div>

                <div class="card-body text-center">

                    <img
                        id="blurImage"
                        class="img-fluid preview">

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow mb-4">

                <div class="card-header">

                    Grayscale

                </div>

                <div class="card-body text-center">

                    <img
                        id="grayImage"
                        class="img-fluid preview">

                </div>

            </div>

        </div>

    </div>

    <div class="row">

        <div class="col-md-6">

            <div class="card shadow mb-4">

                <div class="card-header">

                    CLAHE

                </div>

                <div class="card-body text-center">

                    <img
                        id="claheImage"
                        class="img-fluid preview">

                </div>

            </div>

        </div>

        <div class="col-md-6">

            <div class="card shadow mb-4">

                <div class="card-header">

                    Adaptive Threshold

                </div>

                <div class="card-body text-center">

                    <img
                        id="thresholdImage"
                        class="img-fluid preview">

                </div>

            </div>

        </div>

    </div>

    <!-- OCR RESULT -->

    <div class="card shadow mb-4">

        <div class="card-header">

            OCR Result

        </div>

        <div class="card-body">

            <textarea
                id="ocrText"
                class="form-control"
                rows="8"></textarea>

        </div>

    </div>

    <!-- AUTO FILL FORM -->

    <div class="card shadow">

        <div class="card-header">

            Data KTP

        </div>

        <div class="card-body">

            <div class="row g-3">

                <div class="col-md-6">

                    <label>NIK</label>

                    <input id="nik" class="form-control">

                </div>

                <div class="col-md-6">

                    <label>Nama</label>

                    <input id="nama" class="form-control">

                </div>

                <div class="col-md-6">

                    <label>Tempat Lahir</label>

                    <input id="tempat_lahir" class="form-control">

                </div>

                <div class="col-md-6">

                    <label>Tanggal Lahir</label>

                    <input id="tanggal_lahir" class="form-control">

                </div>

                <div class="col-md-6">

                    <label>Jenis Kelamin</label>

                    <input id="jenis_kelamin" class="form-control">

                </div>

                <div class="col-md-6">

                    <label>Golongan Darah</label>

                    <input id="golongan_darah" class="form-control">

                </div>

                <div class="col-12">

                    <label>Alamat</label>

                    <textarea id="alamat" class="form-control"></textarea>

                </div>

                <div class="col-md-4">

                    <label>RT / RW</label>

                    <input id="rt_rw" class="form-control">

                </div>

                <div class="col-md-4">

                    <label>Kelurahan</label>

                    <input id="kelurahan" class="form-control">

                </div>

                <div class="col-md-4">

                    <label>Kecamatan</label>

                    <input id="kecamatan" class="form-control">

                </div>

                <div class="col-md-4">

                    <label>Agama</label>

                    <input id="agama" class="form-control">

                </div>

                <div class="col-md-4">

                    <label>Status</label>

                    <input id="status_perkawinan" class="form-control">

                </div>

                <div class="col-md-4">

                    <label>Pekerjaan</label>

                    <input id="pekerjaan" class="form-control">

                </div>

                <div class="col-md-6">

                    <label>Kewarganegaraan</label>

                    <input id="kewarganegaraan" class="form-control">

                </div>

                <div class="col-md-6">

                    <label>Berlaku Hingga</label>

                    <input id="berlaku_hingga" class="form-control">

                </div>

            </div>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
```
